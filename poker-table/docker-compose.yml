version: "3.9"

services:
  # MongoDB (only needed if not using Atlas)
  mongo:
    image: mongo:7
    container_name: poker-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  # Backend API
  backend:
    build: ./backend
    container_name: poker-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/poker-table

  # Frontend (production build served via preview)
  frontend:
    build: ./frontend
    container_name: poker-frontend
    restart: unless-stopped
    ports:
      - "5173:4173"
    environment:
      VITE_API_URL: http://localhost:3001

volumes:
  mongo_data:
